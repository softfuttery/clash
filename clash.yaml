    type: select
    include-all: true
  - name: "♻️ 自动选择"
    type: url-test
    include-all: true
    url: "http://www.gstatic.com/generate_204"
    interval: 180
    tolerance: 5
  - name: "🇭🇰 香港节点"
    type: url-test
    filter: "(广港|香港|HK|Hong Kong|🇭🇰|HongKong)"
    url: "http://www.gstatic.com/generate_204"
    interval: 180
    tolerance: 5
  - name: "🇨🇳 台湾节点"
    type: url-test
    filter: "(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)"
    url: "http://www.gstatic.com/generate_204"
    interval: 180
    tolerance: 5
  - name: "🇯🇵 日本节点"
    type: url-test
    filter: "(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)"
    url: "http://www.gstatic.com/generate_204"
    interval: 180
    tolerance: 5
  - name: "🇸🇬 狮城节点"
    type: url-test
    filter: "(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)"
    url: "http://www.gstatic.com/generate_204"
    interval: 180
    tolerance: 5
  - name: "🇰🇷 韩国节点"
    type: url-test
    filter: "(广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea)"
    url: "http://www.gstatic.com/generate_204"
    interval: 180
    tolerance: 5
  - name: "🇺🇲 美国节点"
    type: url-test
    filter: "(广美|美|US|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|硅谷|拉斯|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)"
    url: "http://www.gstatic.com/generate_204"
    interval: 180
    tolerance: 5
  - name: "🌍 其他节点"
